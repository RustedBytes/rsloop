name: Tests

on:
  workflow_dispatch:
    inputs:
      python_versions:
        description: "Space-separated Python versions to test"
        required: false
        type: string
      build_mode:
        description: "Build profile to use with maturin develop"
        required: true
        default: release
        type: choice
        options:
          - release
          - debug

permissions:
  contents: read

jobs:
  test-supported-pythons:
    name: supported-pythons
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0

      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Run tests across supported Python versions
        shell: bash
        env:
          RSLOOP_PYTHON_VERSIONS: ${{ inputs.python_versions }}
        run: |
          args=()
          if [[ "${{ inputs.build_mode }}" == "debug" ]]; then
            args+=(--debug)
          fi
          scripts/test-supported-pythons.sh "${args[@]}"
