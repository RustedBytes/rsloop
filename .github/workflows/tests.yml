name: Tests

on:
  workflow_dispatch:
    inputs:
      python_versions:
        description: "Space-separated Python versions to test"
        required: false
        type: string
      build_mode:
        description: "Build profile to use with maturin develop"
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-matrix:
    name: test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build test matrix
        id: matrix
        shell: bash
        env:
          RSLOOP_PYTHON_VERSIONS_INPUT: ${{ inputs.python_versions || '' }}
        run: |
          source scripts/python-versions.sh
          RSLOOP_PYTHON_VERSIONS_OVERRIDE="$RSLOOP_PYTHON_VERSIONS_INPUT"
          rsloop_load_python_versions

          python3 - "${RSLOOP_PYTHON_VERSIONS[@]}" <<'PY'
          import json
          import os
          import sys

          oses = [
              {"os_name": "linux", "runner": "ubuntu-latest"},
              {"os_name": "windows", "runner": "windows-latest"},
          ]
          versions = sys.argv[1:]
          matrix = {
              "include": [
                  {**os_entry, "python_version": version}
                  for os_entry in oses
                  for version in versions
              ]
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"matrix={json.dumps(matrix, separators=(',', ':'))}", file=output)
          PY

  test-supported-pythons:
    name: ${{ matrix.os_name }} / Python ${{ matrix.python_version }}
    needs: test-matrix
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.test-matrix.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: ${{ matrix.python_version }}
          cache-suffix: ${{ matrix.os_name }}-py${{ matrix.python_version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Run tests for Python ${{ matrix.python_version }}
        timeout-minutes: 50
        shell: bash
        env:
          RSLOOP_PYTHON_VERSIONS: ${{ matrix.python_version }}
          RSLOOP_BUILD_MODE: ${{ inputs.build_mode || 'debug' }}
        run: |
          args=()
          if [[ "$RSLOOP_BUILD_MODE" == "debug" ]]; then
            args+=(--debug)
          fi
          scripts/test-supported-pythons.sh "${args[@]}"
